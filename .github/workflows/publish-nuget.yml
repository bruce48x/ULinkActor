name: Publish NuGet

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: publish-nuget
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Ensure local NuGet feed path exists
        run: mkdir -p artifacts

      - name: Restore test projects
        run: |
          for project in $(find tests -maxdepth 2 -name "*.csproj" -print); do
            dotnet restore "$project"
          done

      - name: Restore package projects
        run: |
          for project in $(find src -maxdepth 2 -name "*.csproj" -print); do
            dotnet restore "$project"
          done

      - name: Test ULinkActor
        timeout-minutes: 5
        run: >
          dotnet test tests/ULinkActor.Tests/ULinkActor.Tests.csproj
          --no-restore
          -c Release
          -m:1
          /nr:false
          /p:UseSharedCompilation=false
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --diag TestResults/vstest-diag.log
          --blame
          --blame-hang
          --blame-hang-timeout 2m
          --blame-hang-dump-type mini

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publish-test-diagnostics
          path: TestResults
          if-no-files-found: ignore

      - name: Pack NuGet packages
        run: |
          rm -rf artifacts/nuget
          mkdir -p artifacts/nuget
          dotnet pack src/ULinkActor/ULinkActor.csproj --no-restore -c Release -o artifacts/nuget

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER || vars.NUGET_USER }}

      - name: Push NuGet packages
        run: |
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
