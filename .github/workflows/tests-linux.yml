name: Tests Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Inspect workspace
        run: |
          pwd
          ls
          find tests -maxdepth 2 -name "*.csproj" -print

      - name: Ensure local NuGet feed path exists
        run: mkdir -p artifacts

      - name: Restore test projects
        run: |
          for project in $(find tests -maxdepth 2 -name "*.csproj" -print); do
            dotnet restore "$project"
          done

      - name: Test ULinkActor
        timeout-minutes: 5
        run: >
          dotnet test "${{ github.workspace }}/tests/ULinkActor.Tests/ULinkActor.Tests.csproj"
          --no-restore
          -m:1
          /nr:false
          /p:UseSharedCompilation=false
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --diag TestResults/vstest-diag.log
          --blame
          --blame-hang
          --blame-hang-timeout 2m
          --blame-hang-dump-type mini

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-diagnostics
          path: TestResults
          if-no-files-found: ignore
